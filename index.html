<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>AIRBUS COCKPIT SYSTEM</title>

<!-- Police cockpit officielle -->
<link href="https://fonts.googleapis.com/css2?family=B612:wght@400;700&display=swap" rel="stylesheet">

<!-- CSS Cockpit (racine) -->
<link rel="stylesheet" href="cockpit.css">
<link rel="stylesheet" href="panels.css">
<link rel="stylesheet" href="mcdu.css">
<link rel="stylesheet" href="ecam.css">
<link rel="stylesheet" href="themes.css">

</head>
<body class="night-mode">

<!-- Écran de démarrage Airbus -->
<div id="boot-screen">
  <img id="boot-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/Airbus_logo_2017.svg/512px-Airbus_logo_2017.svg.png">
</div>

<!-- Menu MCDU latéral -->
<div id="mcdu-menu">
  <div class="mcdu-title">MCDU MENU</div>

  <button class="lsk" onclick="openPage('convert')">CONVERT</button>
  <button class="lsk" onclick="openPage('geometry')">GEOMETRY</button>
  <button class="lsk" onclick="openPage('ecam')">ECAM</button>
  <button class="lsk" onclick="openPage('settings')">SETTINGS</button>
  <button class="lsk" onclick="openPage('about')">ABOUT</button>

  <div class="mcdu-footer">A350 STYLE</div>
</div>

<!-- Contenu principal -->
<div id="main-content">

  <!-- PAGE : CONVERTISSEURS -->
  <section id="page-convert" class="cockpit-page">
    <h1>CONVERSION PANEL</h1>

    <div id="panel-lengths" class="panel">
      <h2>Longueurs</h2>
      <input id="len-value" type="text" placeholder="Valeur">
      <select id="len-from">
        <option value="m">mètre</option>
        <option value="cm">centimètre</option>
        <option value="mm">millimètre</option>
        <option value="km">kilomètre</option>
        <option value="inch">pouce</option>
        <option value="ft">pied</option>
        <option value="yd">yard</option>
        <option value="mile">mile</option>
        <option value="nmi">mile nautique</option>
      </select>
      <select id="len-to">
        <option value="m">mètre</option>
        <option value="cm">centimètre</option>
        <option value="mm">millimètre</option>
        <option value="km">kilomètre</option>
        <option value="inch">pouce</option>
        <option value="ft">pied</option>
        <option value="yd">yard</option>
        <option value="mile">mile</option>
        <option value="nmi">mile nautique</option>
      </select>
      <button onclick="convertLength()">CONVERT</button>
      <div id="len-result" class="result"></div>
    </div>

    <div id="panel-weights" class="panel">
      <h2>Poids</h2>
      <input id="w-value" type="text" placeholder="Valeur">
      <select id="w-from">
        <option value="kg">kg</option>
        <option value="g">g</option>
        <option value="lb">lb</option>
        <option value="oz">oz</option>
      </select>
      <select id="w-to">
        <option value="kg">kg</option>
        <option value="g">g</option>
        <option value="lb">lb</option>
        <option value="oz">oz</option>
      </select>
      <button onclick="convertWeight()">CONVERT</button>
      <div id="w-result" class="result"></div>
    </div>

    <div id="panel-volumes" class="panel">
      <h2>Volumes</h2>
      <input id="v-value" type="text" placeholder="Valeur">
      <select id="v-from">
        <option value="l">litre</option>
        <option value="ml">millilitre</option>
        <option value="gal_us">gallon US</option>
        <option value="gal_uk">gallon UK</option>
      </select>
      <select id="v-to">
        <option value="l">litre</option>
        <option value="ml">millilitre</option>
        <option value="gal_us">gallon US</option>
        <option value="gal_uk">gallon UK</option>
      </select>
      <button onclick="convertVolume()">CONVERT</button>

      <div id="airbus-keyboard">
        <button class="kbd">1</button>
        <button class="kbd">2</button>
        <button class="kbd">3</button>

        <button class="kbd">4</button>
        <button class="kbd">5</button>
        <button class="kbd">6</button>

        <button class="kbd">7</button>
        <button class="kbd">8</button>
        <button class="kbd">9</button>

        <button class="kbd">0</button>
        <button class="kbd kbd-del">DEL</button>
        <button class="kbd kbd-clr">CLR</button>

        <button class="kbd kbd-convert">CONV</button>
        <button class="kbd kbd-enter">ENTER</button>
      </div>
    </div>
  </section>

</div>

<!-- Scripts JS (racine) -->
<script src="conversions.js"></script>
<script src="geometry.js"></script>
<script src="volumes.js"></script>
<script src="theme.js"></script>
<script src="sounds.js"></script>
<script src="mcdu.js"></script>

</body>
</html>
